# Unified REAL smoke stack — the agent + all three real sibling planes on one network.
#
# Consolidates the three proven standalone plane composes (compose.gate.yml,
# compose.forge.yml, compose.fabric.yml — each verified in isolation) plus the agent,
# so the smoke drives the agent against REAL gate + real forge + real fabric.
#
# Service naming: gate-* / forge-* / fabric-* (no collisions across the three postgres
# instances). One project network. The agent starts LAST, after every plane is healthy.
#
# NOTHING here is written into the sibling repos — every build uses a read-only build
# context, every sibling-derived config is vendored under smoke/.
#
# Run:  smoke/run-real.sh   (exports DOCKER_HOST, up --build --wait, smoke, down -v)
#
# NOTE (forge gateway): forge's fdb-gateway boot is BLOCKED on forge's duplicate
# migration versions (Know-Me-Tools/flint-forge#7) — un-fixable from here. So the unified
# stack includes the real forge PG + bootstrap (proven), and the agent's FPA_FORGE_URL
# points at the forge gateway which is included but may not reach healthy until #7 lands.
# The forge-gateway service is in the `forge-full` profile so the default `up` converges
# on the planes that boot; enable it with `--profile forge-full` once #7 is fixed.

name: fpa-smoke-real

services:
  # ─────────────────────────── agent (starts last) ───────────────────────────
  agent:
    build:
      context: ..
      dockerfile: smoke/Dockerfile
    depends_on:
      agent-postgres:
        condition: service_healthy
      flint-gate:
        condition: service_healthy
      fabric-gateway:
        condition: service_healthy
    environment:
      FPA_GATEWAY_ADDR: "0.0.0.0:8088"
      # REAL planes:
      FPA_GATE_ADMIN_URL: "http://flint-gate:4457"
      FPA_FABRIC_ENDPOINT: "http://fabric-gateway:8080"
      # forge gateway (see NOTE — blocked on flint-forge#7; points at it regardless).
      FPA_FORGE_URL: "http://forge-gateway:8080"
      # agent's own durable ProjectStore:
      FPA_PROJECT_DB_URL: "postgres://postgres:postgres@agent-postgres:5432/postgres"
      # throwaway HS256 test secret — NOT a real credential. The agent verifies the
      # operator's INCOMING bearer via this HS256 key (its own identity path).
      FPA_GATE_JWT_KEY: "smoke-hs256-secret-not-a-real-credential"
      # Fabric verifies RS256 (its dev IdP JWKS), a different IdP than the agent's
      # HS256. So the /fabric/subscribe bridge forwards THIS long-lived RS256 dev
      # bearer to fabric instead of the operator's HS256 bearer (p12-c003). It is a
      # throwaway smoke credential minted from smoke/dev-idp/private-key.pem — see
      # smoke/dev-idp/README.md. Regenerate with smoke/dev-idp/mint-fabric-bearer.mjs.
      FPA_FABRIC_BEARER: "${FPA_FABRIC_BEARER:-}"
      RUST_LOG: "info"
    ports:
      - "8088:8088"
    # No container healthcheck: the slim runtime has no curl/bash-/dev/tcp, and the
    # binary has no --version. run-real.sh polls http://localhost:8088/healthz from the
    # host once the agent's deps are healthy (matches the phase-9 stub smoke).

  agent-postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  # ─────────────────────────── gate plane (c001, proven) ─────────────────────
  gate-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: flintgate
      POSTGRES_PASSWORD: flintgate
      POSTGRES_DB: flintgate
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flintgate -d flintgate"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  flint-gate:
    build:
      context: ../../flint-gate
      dockerfile: Dockerfile
    depends_on:
      gate-postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgres://flintgate:flintgate@gate-postgres:5432/flintgate"
      FLINT_GATE_CONFIG: "/app/config/config.yaml"
      RUST_LOG: "info,flint_gate=debug"
    volumes:
      - ./gate-config/config.smoke.yaml:/app/config/config.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4457/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  # ─────────────────────────── fabric plane (c003, proven) ───────────────────
  fabric-postgres:
    image: postgres:17-alpine
    command: postgres -c wal_level=logical -c max_replication_slots=5 -c max_wal_senders=5
    environment:
      POSTGRES_USER: frf
      POSTGRES_PASSWORD: frf
      POSTGRES_DB: frf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U frf -d frf"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  fabric-iggy:
    # Protocol-matched Iggy server built from the SAME fork rev fabric's iggy
    # CLIENT is locked to (see iggy.Dockerfile). Upstream `iggyrs/iggy:latest`
    # floats past that protocol → `invalid_command` on sign-in → a real
    # /fabric/subscribe fails deep in the LogBroker → 502 at the agent bridge.
    build:
      context: .
      dockerfile: iggy.Dockerfile
    environment:
      IGGY_SYSTEM_PATH: "/data"
      # The fork's server generates a RANDOM root password on first boot (logged
      # once as "Generated root user password: ...") UNLESS both of these are set
      # — see core/server/src/bootstrap.rs:create_root_user (`if username.is_ok()
      # && password.is_ok()` uses the env vars, else falls back to a random
      # secret). Pin them to iggy/iggy so they match the fabric-gateway
      # IGGY_CONNECTION_STRING below; otherwise the client's sign-in is rejected
      # with invalid_credentials (status 42).
      IGGY_ROOT_USERNAME: "iggy"
      IGGY_ROOT_PASSWORD: "iggy"
    # The fork's iggy-server uses the io_uring async runtime, whose
    # io_uring_setup/enter/register syscalls are blocked by Docker's default
    # seccomp profile → "Cannot create runtime: Operation not permitted" and the
    # server panics on boot (exit 101). Unconfined seccomp lets io_uring through.
    # This is a smoke-only container; unconfined here is acceptable.
    security_opt:
      - seccomp:unconfined
    volumes:
      - fabric-iggy-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/ping || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

  fabric-keto:
    image: oryd/keto:v0.12
    volumes:
      - ./fabric-config/keto.yml:/etc/config/keto/keto.yml:ro
    command: ["serve", "-c", "/etc/config/keto/keto.yml"]
    ports:
      - "14466:4466" # read — accessible from host for smoke assertions
      - "14467:4467" # write — needed by the smoke spec to seed relation tuples
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4466/health/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # Serves smoke/dev-idp/jwks.json so fabric's OryIdentityVerifier can verify
  # RS256 bearers the smoke mints (p12-c001-dev-idp-keys).
  dev-idp-jwks:
    image: nginx:alpine
    volumes:
      - ./dev-idp/jwks.json:/usr/share/nginx/html/jwks.json:ro
    ports:
      - "18080:80" # host 18080 (informational — fabric reaches it internally)

  fabric-gateway:
    build:
      context: ../../flint-realtime-fabric
      # Smoke-local Dockerfile: fabric's own image build is BROKEN on current
      # main — routes/admin_ui.rs embeds admin-ui/dist with rust-embed, but
      # fabric's Dockerfile never copies admin-ui/ into the context, so the
      # rust-embed derive fails to generate `get()` (E0599). Our override adds a
      # placeholder admin-ui/dist/index.html before cargo build. See the header
      # of smoke/fabric-gateway.Dockerfile. Nothing is written into ../flint-realtime-fabric.
      dockerfile: ../flint-platform-agent/smoke/fabric-gateway.Dockerfile
      args:
        CARGO_FEATURES: dev-endpoints
    depends_on:
      fabric-iggy:
        condition: service_healthy
      fabric-keto:
        condition: service_started
      fabric-postgres:
        condition: service_healthy
      dev-idp-jwks:
        condition: service_started
    environment:
      BIND_ADDR: "0.0.0.0:8080"
      GRPC_PORT: "9090"
      IGGY_CONNECTION_STRING: "iggy://iggy:iggy@fabric-iggy:8090"
      KETO_BASE_URL: "http://fabric-keto:4466"
      KETO_NAMESPACE: "default"
      # Dev IdP JWKS: the smoke mints RS256 bearers; fabric verifies them (p12-c002).
      GATEWAY_JWKS_URL: "http://dev-idp-jwks:80/jwks.json"
      JWT_AUDIENCE: "frf-gateway"
      SFU_MODE: "sovereign"
      RUST_LOG: "info"
      CDC_ENABLED: "false"
      # DEV_NO_AUTH intentionally UNSET: the realtime-receipt proof runs fabric's
      # REAL RS256 verification on BOTH the subscribe and publish hops. Under
      # DEV_NO_AUTH=true the subscribe route discards the forwarded bearer and hands
      # an empty token to the pipeline, which still calls identity.verify() (there is
      # no dev bypass in the verifier) → 401. So the smoke mints real RS256 bearers
      # (dev IdP, verified via GATEWAY_JWKS_URL) for both hops and seeds the matching
      # Keto tuples (subscribe/publish/view). "Nothing but real stuff" (p12-c003).
    ports:
      - "28080:8080"
      - "29090:9090"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 40s

  # ─────────────────────────── forge plane (c002) ────────────────────────────
  # PG + bootstrap PROVEN; forge-gateway BLOCKED on flint-forge#7 (dup migration
  # versions). Gateway is in the `forge-full` profile so the default run converges.
  forge-postgres:
    # forge-full only: nothing in the DEFAULT run uses forge (the agent's FPA_FORGE_URL
    # points at forge-gateway, which is blocked on flint-forge#7). Keeping the forge PG
    # out of the default run lightens the stack to the planes that actually serve the
    # agent's HTTP hops (gate + fabric). The forge PG + bootstrap are proven in c002.
    profiles: ["forge-full"]
    image: postgres:18-bookworm
    build:
      context: ../../flint-forge
      dockerfile: docker/postgres/Dockerfile
      args:
        PGVECTOR_REF: v0.8.4
        PG_GRAPHQL_REF: v1.6.1
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flint
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d flint"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  forge-bootstrap:
    # Only needed alongside the forge gateway (forge-full). A one-shot that exits 0
    # trips `docker compose up --wait` (it treats the exit as a stopped service and
    # fails the wait), which would tear the healthy stack down. Gate it to the same
    # profile as forge-gateway so the default run isn't blocked by it.
    profiles: ["forge-full"]
    image: postgres:18-bookworm
    depends_on:
      forge-postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@forge-postgres:5432/flint
      BOOTSTRAP_DIR: /bootstrap
    volumes:
      - ./forge-bootstrap:/bootstrap:ro
    entrypoint: ["/bin/sh", "/bootstrap/apply.sh"]
    restart: "no"

  forge-gateway:
    profiles: ["forge-full"] # blocked on flint-forge#7 — off by default
    build:
      context: ../../flint-forge
      dockerfile: ../flint-platform-agent/smoke/fdb-gateway.Dockerfile
    depends_on:
      forge-bootstrap:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://postgres:postgres@forge-postgres:5432/flint
      KETO_BASE_URL: http://fabric-keto:4466
      RUST_LOG: info
    ports:
      - "18080:8080"

volumes:
  fabric-iggy-data:
