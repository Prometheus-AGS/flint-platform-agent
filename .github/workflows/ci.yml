name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all --check

  clippy:
    name: Clippy (pedantic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo test
        run: cargo test --workspace

  msrv:
    name: MSRV check (Rust 1.93)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93"
          components: rustfmt, clippy
      - name: cargo check (MSRV)
        run: cargo check --workspace

  smoke:
    name: Stub smoke (self-contained)
    runs-on: ubuntu-latest
    # Guards the agent's RUNTIME wiring (boot + protocol-surface HTTP hops), not just the
    # Rust build. Uses the self-contained stub stack (agent + postgres + wiremock) — NO
    # sibling repos, NO secrets. The agent builds from this repo alone (frf-domain is
    # vendored under vendor/). ubuntu-latest ships Docker + Compose v2 + Node.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # smoke/run.sh: docker check -> compose up --build -> wait /healthz -> npm install
      # (no browsers, HTTP-only) -> npm test -> `down -v` on trap. Dies non-zero on fail.
      - name: Run the stub smoke
        run: ./smoke/run.sh
